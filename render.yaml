services:
  - type: web
    name: survey-poc
    runtime: ruby
    plan: starter
    region: oregon
    buildCommand: "./bin/render-build.sh"
    startCommand: "bundle exec rails db:prepare && bundle exec rails db:seed && bundle exec rails server -e production -p $PORT"
    healthCheckPath: /up
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RACK_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: "1"
      - key: RAILS_SERVE_STATIC_FILES
        value: "1"
      - key: WEB_CONCURRENCY
        value: "1"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SECRET_KEY_BASE
        generateValue: true
      # Google Sheets export (per-user OAuth) — see .env.example
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      # Active Record Encryption (encrypts stored Google tokens) — see .env.example
      - key: ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY
        sync: false
      - key: ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY
        sync: false
      - key: ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT
        sync: false
      - key: APP_HOST
        sync: false
      - key: APP_PROTOCOL
        value: https
      - key: MAIL_FROM
        sync: false
      - key: MAIL_REPLY_TO
        sync: false
      - key: SMTP_ADDRESS
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_AUTHENTICATION
        value: plain
      - key: SMTP_STARTTLS
        value: "true"
      - key: SMTP_TLS
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: survey-poc-db
          property: connectionString

databases:
  - name: survey-poc-db
    plan: starter
    region: oregon
