services:
  - type: web
    name: survey-poc
    runtime: ruby
    plan: starter
    region: oregon
    buildCommand: "./bin/render-build.sh"
    preDeployCommand: "bundle exec rails db:prepare && bundle exec rails db:seed"
    startCommand: "bundle exec rails server -e production -p $PORT"
    healthCheckPath: /up
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RACK_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: "1"
      - key: RAILS_SERVE_STATIC_FILES
        value: "1"
      - key: WEB_CONCURRENCY
        value: "1"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: survey-poc-db
          property: connectionString

databases:
  - name: survey-poc-db
    plan: starter
    region: oregon
