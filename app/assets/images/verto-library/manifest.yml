# Asset manifest for AssetPopulator (app/services/asset_populator.rb).
#
# Adding a new asset:
#   1. Drop the file into the matching sub-folder under verto-library/.
#   2. Add a YAML entry below with at least `file:` (filename only, no path).
#   3. The matcher reads this at request time, so no precompile needed in dev.
#
# Vocabularies (kept small on purpose — see plan):
#   themes:     open list (sport, fitness, community, social, climate,
#               environment, outdoors, nature, travel, brand, work,
#               health, education, food, family, lifestyle, ...)
#   age:        kids | teen | young-adult | adult | senior | all
#   mood:       playful | energetic | festive | calm | serious | warm
#   style:      photo | illustrated | vector | vibrant | minimal | warm
#   card_types: any of the keys in config/card_types.yml
#   keywords:   per-asset keywords matched against card text + options
#               (heavier weight than themes; use for subject-specific picks)

# Theme clusters — a query theme is expanded through any cluster it appears
# in before scoring against assets. So a "food" survey also matches assets
# tagged `nature`, `sustainability`, etc.; a "fitness" survey matches assets
# tagged `sport`, `training`, `community`, etc. Clusters are bidirectional —
# every member of a cluster pulls in every other member.
theme_clusters:
  - [food, nutrition, cooking, eating, diet, healthy, wellness, wellbeing, nature, climate, environment, sustainability, sustainable, organic, agriculture, outdoors, conservation]
  - [sport, sports, fitness, athletics, athletes, training, exercise, gym, health, community, team, competition]
  - [brand, retail, marketing, lifestyle, advertising, social, consumer, shopping]
  - [education, students, learning, school, university, academic, study]
  - [work, employment, professional, workplace, career, jobs, employer, employee]
  - [travel, holiday, vacation, tourism, exploration, hiking, outdoors, nature, adventure]
  - [climate, environment, sustainability, sustainable, conservation, nature, outdoors, planet, green]

backgrounds:
  - file: landscape.jpg
    themes: [outdoors, nature, travel, hiking, exploration]
    mood: [calm, warm]
    style: [photo]
  - file: nature.jpg
    themes: [climate, environment, sustainability, conservation, nature, outdoors]
    mood: [calm]
    style: [photo]
  - file: people.jpg
    themes: [community, social, work, brand, education, family, lifestyle, team]
    age: [all]
    mood: [warm]
    style: [photo]
  - file: sport.jpg
    themes: [sport, fitness, competition, health, athletics, training, exercise]
    age: [teen, young-adult, adult]
    mood: [energetic, playful]
    style: [photo]

