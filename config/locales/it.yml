    s1_hint_body: Mantienilo ampio — affinerai l'angolazione nei prossimi passi.
    s2_eyebrow: Passo 02 · Chi risponde
    s2_lead: Sii specifico.
    s2_body: Stile di vita, ruolo, regione, lingua — qualsiasi cosa influenzi il modo di pensare di questo gruppo. Più sei concreto, migliori saranno le domande che potremo scrivere.
    s2_examples:
    - Studenti universitari 18–24 in Kenya
    - Operatori sanitari di comunità in prima linea 35–55
    - Genitori di bambini in età scolare nelle zone rurali del NSW
    s2_title: Chi risponde — e che età ha?
    s2_placeholder: es. Studenti universitari 18–24 in Kenya
    s2_hint_body: Stile di vita, ruolo, regione, lingua — qualsiasi cosa influenzi il modo di pensare di questo gruppo.
    s3_eyebrow: Passo 03 · L'obiettivo di apprendimento
    s3_lead: L'intuizione che cambierebbe una decisione.
    s3_body: Tralascia le cose che già sai. Punta all'unica cosa che, se la scoprissi, cambierebbe il tuo prossimo passo.
    s3_examples:
    - Perché i volontari abbandonano dopo il terzo mese?
    - Cosa impedisce alle persone di accedere al nostro banco alimentare?
    - Il nostro programma per i giovani aumenta davvero la fiducia — e dove esattamente?
    s3_title: Cosa vuoi scoprire da loro?
    s3_placeholder: es. Perché i volontari abbandonano dopo il terzo mese?
    s3_hint_body: Tralascia ciò che già sai — punta all'unica cosa che cambierebbe il tuo prossimo passo.
