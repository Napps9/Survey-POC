    s4_lead: Atteignez tout le monde dans sa propre langue.
    s4_body: Nous rédigerons le Verto dans votre langue principale, puis une version tout aussi soignée dans chaque autre langue. Chaque version pose les mêmes questions, les résultats restent donc cohérents.
