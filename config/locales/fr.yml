    s1_title: Quel est le sujet de votre Verto ?
    s1_placeholder: ex. Bien-être des jeunes
    s1_hint_body: Restez large — vous affinerez l'angle aux étapes suivantes.
    s2_eyebrow: Étape 02 · Qui répond
    s2_lead: Soyez précis.
    s2_body: Mode de vie, rôle, région, langue — tout ce qui influence la façon de penser de ce groupe. Plus c'est concret, meilleures seront les questions.
    s2_examples:
    - Étudiants de 18 à 24 ans au Kenya
    - Agents de santé communautaire de première ligne, 35–55 ans
    - Parents d'enfants scolarisés en Nouvelle-Galles du Sud rurale
    s2_title: Qui répond — et quel âge a-t-il ?
    s2_placeholder: ex. Étudiants de 18 à 24 ans au Kenya
    s2_hint_body: Mode de vie, rôle, région, langue — tout ce qui influence la façon de penser de ce groupe.
    s3_eyebrow: Étape 03 · L'objectif d'apprentissage
    s3_lead: L'insight qui changerait une décision.
    s3_body: Ignorez ce que vous savez déjà. Visez la seule chose qui, si vous la découvriez, changerait votre prochaine action.
    s3_examples:
    - Pourquoi les bénévoles abandonnent-ils après trois mois ?
    - Qu'est-ce qui empêche les gens d'accéder à notre banque alimentaire ?
    - Notre programme jeunesse renforce-t-il vraiment la confiance — et où exactement ?
    s3_title: Que souhaitez-vous apprendre d'eux ?
    s3_placeholder: ex. Pourquoi les bénévoles abandonnent-ils après trois mois ?
    s3_hint_body: Ignorez ce que vous savez déjà — visez la seule chose qui changerait votre prochaine action.
