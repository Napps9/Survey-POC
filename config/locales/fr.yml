    s1_eyebrow: Étape 01 · À propos de votre Verto
    s1_lead: Le grand thème central.
    s1_body: Restez large — vous affinerez l'angle aux étapes suivantes. Un ou deux mots suffisent généralement.
    s1_examples:
    - Action climatique
    - Éducation des réfugiés
