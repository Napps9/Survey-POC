    s1_hint_body: Iweke pana — utabana mtazamo katika hatua zinazofuata.
    s2_eyebrow: Hatua 02 · Nani anajibu
    s2_lead: Kuwa wazi.
    s2_body: Mtindo wa maisha, jukumu, eneo, lugha — chochote kinachounda jinsi kundi hili linavyofikiri. Kadri unavyokuwa wazi zaidi, ndivyo tunavyoweza kuandika maswali bora.
    s2_examples:
    - Wanafunzi wa chuo wenye umri wa miaka 18–24 nchini Kenya
    - Wahudumu wa afya wa jamii wenye umri wa miaka 35–55
    - Wazazi wa watoto wa umri wa shule mashambani NSW
    s2_title: Nani anajibu — na wana umri gani?
    s2_placeholder: 'mfano: Wanafunzi wa chuo wenye umri wa miaka 18–24 nchini Kenya'
    s2_hint_body: Mtindo wa maisha, jukumu, eneo, lugha — chochote kinachounda jinsi kundi hili linavyofikiri.
    s3_eyebrow: Hatua 03 · Lengo la kujifunza
    s3_lead: Maarifa ambayo yangebadilisha uamuzi.
    s3_body: Ruka vitu unavyojua tayari. Lenga jambo moja ambalo, ukijifunza, lingebadilisha unachofanya baadaye.
    s3_examples:
    - Kwa nini wajitoleaji wanaacha baada ya mwezi wa tatu?
    - Nini kinazuia watu kufikia benki yetu ya chakula?
    - Je, programu yetu ya vijana inabadilisha kweli imani — na hasa wapi?
    s3_title: Unataka kujifunza nini kutoka kwao?
    s3_placeholder: 'mfano: Kwa nini wajitoleaji wanaacha baada ya mwezi wa tatu?'
    s3_hint_body: Ruka unachojua tayari — lenga jambo moja ambalo lingebadilisha unachofanya baadaye.
    s4_eyebrow: Hatua 04 · Lugha
    s4_lead: Fika kwa kila mtu kwa lugha yake.
    s4_body: Tutaandika Verto kwa lugha yako ya msingi, kisha tutatengeneza toleo bora sawa kwa kila lugha nyingine. Kila toleo huuliza maswali yale yale, hivyo matokeo yanabaki yamelinganishwa.
    s4_title: Verto hii izungumze lugha zipi?
    s4_primary_label: Lugha ya msingi
    s5_eyebrow: Hatua 05 · Rangi za chapa
    s5_lead: Ifanye iwe na hisia za wewe.
    s5_body: Hivi ndivyo Verto yako inavyoonekana kwa kila mtu anayeicheza. Unaweza kuibadilisha wakati wowote kutoka kwa mhariri.
