    examples: Przykłady
    s1_eyebrow: Krok 01 · O Twoim Verto
    s1_lead: Jeden nadrzędny temat.
    s1_body: Niech będzie szeroki — kąt zawęzisz w kolejnych krokach. Zwykle wystarczy jedno lub dwa słowa.
    s1_examples:
    - Działania klimatyczne
    - Edukacja uchodźców
    - Bezpieczeństwo żywnościowe
    s1_title: O czym jest Twoje Verto?
    s1_placeholder: np. Dobrostan młodzieży
    s1_hint_body: Niech będzie szeroki — kąt zawęzisz w kolejnych krokach.
    s2_eyebrow: Krok 02 · Kto odpowiada
    s2_lead: Bądź konkretny.
    s2_body: Styl życia, rola, region, język — wszystko, co kształtuje sposób myślenia tej grupy. Im bardziej konkretnie, tym lepsze pytania możemy ułożyć.
    s2_examples:
    - Studenci w wieku 18–24 lat w Kenii
    - Pracownicy zdrowia środowiskowego w wieku 35–55 lat
    - Rodzice dzieci w wieku szkolnym z wiejskich obszarów NSW
    s2_title: Kto odpowiada — i w jakim jest wieku?
    s2_placeholder: np. Studenci w wieku 18–24 lat w Kenii
    s2_hint_body: Styl życia, rola, region, język — wszystko, co kształtuje sposób myślenia tej grupy.
    s3_eyebrow: Krok 03 · Cel poznawczy
    s3_lead: Wniosek, który zmieniłby decyzję.
    s3_body: Pomiń to, co już wiesz. Skup się na tej jednej rzeczy, która — gdybyś się o niej dowiedział — zmieniłaby Twoje następne kroki.
    s3_examples:
    - Dlaczego wolontariusze rezygnują po trzecim miesiącu?
    - Co powstrzymuje ludzi przed korzystaniem z naszego banku żywności?
    - Czy nasz program dla młodzieży faktycznie zwiększa pewność siebie — i w jakich obszarach?
    s3_title: Czego chcesz się od nich dowiedzieć?
    s3_placeholder: np. Dlaczego wolontariusze rezygnują po trzecim miesiącu?
    s3_hint_body: Pomiń to, co już wiesz — skup się na tej jednej rzeczy, która zmieniłaby Twoje następne kroki.
    s4_eyebrow: Krok 04 · Języki
    s4_lead: Dotrzyj do każdego w jego języku.
    s4_body: Napiszemy Verto w Twoim głównym języku, a następnie przygotujemy równie dobrą wersję w każdym innym języku. Każda wersja zadaje te same pytania, więc wyniki pozostają spójne.
    s4_title: W jakich językach ma mówić to Verto?
    s4_primary_label: Język główny
