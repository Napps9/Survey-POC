    s6_eyebrow: Bước 06 · Bối cảnh
    optional: Tùy chọn
    s6_lead: Còn gì khác chúng tôi nên đưa vào không?
    s6_body: Giọng điệu, câu hỏi bắt buộc, điều cần tránh, đặc điểm khán giả. Bỏ qua nếu không có gì thêm.
    s6_examples:
    - Phải bao gồm câu hỏi về các kênh tài trợ và rào cản đối với các khoản tài trợ.
    - Tránh dùng thuật ngữ chuyên ngành — nhiều người trả lời nói tiếng Anh như ngôn ngữ thứ hai.
    - Giữ giọng điệu ấm áp, không quá doanh nghiệp.
    s6_title: Còn gì khác chúng tôi nên biết?
    s6_placeholder: 'ví dụ: Khán giả chưa từng dùng Playverto, giữ giọng điệu ấm áp, không quá doanh nghiệp.'
    s6_compare_label: Cho phép người trả lời so sánh câu trả lời của họ
    s6_compare_desc: Hiển thị CTA trên trang cảm ơn để cho thấy câu trả lời của họ so sánh thế nào với mọi người khác.
