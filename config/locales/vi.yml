    s2_title: Ai đang trả lời — và họ ở độ tuổi nào?
    s2_placeholder: 'ví dụ: Sinh viên đại học 18–24 tuổi tại Kenya'
    s2_hint_body: Phong cách sống, vai trò, khu vực, ngôn ngữ — bất cứ điều gì định hình cách nhóm này suy nghĩ.
    s3_eyebrow: Bước 03 · Mục tiêu học hỏi
    s3_lead: Thông tin chi tiết có thể thay đổi một quyết định.
    s3_body: Bỏ qua những điều bạn đã biết. Hướng tới điều duy nhất mà nếu biết được sẽ thay đổi việc bạn làm tiếp theo.
    s3_examples:
    - Tại sao tình nguyện viên bỏ cuộc sau tháng thứ ba?
    - Điều gì ngăn cản mọi người tiếp cận ngân hàng thực phẩm của chúng tôi?
    - Chương trình thanh niên của chúng tôi có thực sự thay đổi sự tự tin không — và ở đâu chính xác?
    s3_title: Bạn muốn tìm hiểu gì từ họ?
    s3_placeholder: 'ví dụ: Tại sao tình nguyện viên bỏ cuộc sau tháng thứ ba?'
    s3_hint_body: Bỏ qua những gì bạn đã biết — hướng tới điều duy nhất sẽ thay đổi việc bạn làm tiếp theo.
    s4_eyebrow: Bước 04 · Ngôn ngữ
    s4_lead: Tiếp cận mọi người bằng ngôn ngữ của họ.
    s4_body: Chúng tôi sẽ viết Verto bằng ngôn ngữ chính của bạn, sau đó tạo ra phiên bản chất lượng tương đương cho mỗi ngôn ngữ khác. Mọi phiên bản đều hỏi cùng câu hỏi, nên kết quả vẫn nhất quán.
    s4_title: Verto này nên dùng những ngôn ngữ nào?
    s4_primary_label: Ngôn ngữ chính
    s5_eyebrow: Bước 05 · Màu sắc thương hiệu
    s5_lead: Khiến nó mang phong cách của bạn.
    s5_body: Đây là cách Verto của bạn hiển thị với mọi người chơi. Bạn có thể tinh chỉnh bất cứ lúc nào từ trình chỉnh sửa.
    s5_live_preview: Xem trước trực tiếp
    s5_quick_poll: Khảo sát nhanh
    s5_mock_q: Bạn thấy nó thế nào?
    s5_mock_opt: Rất thích
    s5_title: Chọn màu sắc thương hiệu của bạn.
    s5_sub: Chọn ba màu. Chúng sẽ được áp dụng xuyên suốt trải nghiệm của Verto này.
