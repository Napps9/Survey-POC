    s3_examples: '["Warum springen Freiwillige nach dem dritten Monat ab?", "Was hält Menschen davon ab, unsere Tafel zu nutzen?", "Stärkt unser Jugendprogramm tatsächlich das Selbstvertrauen — und wo genau?"]'
