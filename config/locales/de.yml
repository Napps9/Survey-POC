    s1_title: Worum geht es in deinem Verto?
    s1_placeholder: z. B. Wohlbefinden von Jugendlichen
    s1_hint_body: Halte es breit — den Fokus schärfst du in den nächsten Schritten.
    s2_eyebrow: Schritt 02 · Wer antwortet
    s2_lead: Sei konkret.
    s2_body: Lebensstil, Rolle, Region, Sprache — alles, was die Sichtweise dieser Gruppe prägt. Je konkreter, desto besser können wir die Fragen schreiben.
    s2_examples:
    - 18–24-jährige Studierende in Kenia
    - 35–55-jährige Mitarbeitende im Gesundheitswesen vor Ort
    - Eltern schulpflichtiger Kinder im ländlichen NSW
    s2_title: Wer antwortet — und wie alt sind diese Personen?
    s2_placeholder: z. B. 18–24-jährige Studierende in Kenia
    s2_hint_body: Lebensstil, Rolle, Region, Sprache — alles, was die Sichtweise dieser Gruppe prägt.
    s3_eyebrow: Schritt 03 · Das Lernziel
    s3_lead: Die Erkenntnis, die eine Entscheidung verändern würde.
    s3_body: Überspringe, was du bereits weißt. Ziel ist das eine, das — würdest du es erfahren — dein nächstes Vorgehen verändern würde.
    s3_examples:
    - Warum springen Freiwillige nach dem dritten Monat ab?
    - Was hält Menschen davon ab, unsere Tafel zu nutzen?
    - Stärkt unser Jugendprogramm tatsächlich das Selbstvertrauen — und wo genau?
    s3_title: Was möchtest du von ihnen lernen?
    s3_placeholder: z. B. Warum springen Freiwillige nach dem dritten Monat ab?
    s3_hint_body: Überspringe, was du bereits weißt — finde das eine, das dein nächstes Vorgehen verändern würde.
    s4_eyebrow: Schritt 04 · Sprachen
    s4_lead: Erreiche alle in ihrer eigenen Sprache.
    s4_body: Wir schreiben das Verto in deiner Hauptsprache und erstellen anschließend eine ebenso gute Version in jeder weiteren Sprache. Jede Version stellt dieselben Fragen, sodass die Ergebnisse vergleichbar bleiben.
    s4_title: Welche Sprachen soll dieses Verto sprechen?
    s4_primary_label: Hauptsprache
    s5_eyebrow: Schritt 05 · Markenfarben
    s5_lead: Lass es nach dir aussehen.
    s5_body: So sieht dein Verto für alle aus, die es spielen. Du kannst es jederzeit im Editor feinjustieren.
