    s1_eyebrow: Schritt 01 · Über dein Verto
    s1_lead: Das eine übergeordnete Thema.
    s1_body: Halte es breit — den Fokus schärfst du in den nächsten Schritten. Ein oder zwei Wörter reichen meist aus.
    s1_examples:
