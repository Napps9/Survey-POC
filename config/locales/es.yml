    s3_eyebrow: Paso 03 · El objetivo de aprendizaje
    s3_lead: La información que cambiaría una decisión.
    s3_body: Omite lo que ya sabes. Apunta a esa única cosa que, si la aprendieras, cambiaría lo que harías a continuación.
    s3_examples:
    - "¿Por qué los voluntarios abandonan después del tercer mes?"
    - "¿Qué impide que la gente acceda a nuestro banco de alimentos?"
    - "¿Nuestro programa juvenil realmente aumenta la confianza — y en qué aspectos exactamente?"
