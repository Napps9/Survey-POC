    s1_title: Tentang apa Verto Anda?
    s1_placeholder: misal Kesejahteraan remaja
    s1_hint_body: Buat luas — Anda akan mempersempit sudut pandang di langkah berikutnya.
    s2_eyebrow: Langkah 02 · Siapa yang menjawab
    s2_lead: Jelaskan secara spesifik.
    s2_body: Gaya hidup, peran, wilayah, bahasa — apa pun yang membentuk cara berpikir kelompok ini. Semakin konkret, semakin baik pertanyaan yang dapat kami tulis.
    s2_examples:
    - Mahasiswa 18–24 tahun di Kenya
    - Petugas kesehatan komunitas garis depan usia 35–55
    - Orang tua anak usia sekolah di pedesaan NSW
    s2_title: Siapa yang menjawab — dan berapa usia mereka?
    s2_placeholder: misal Mahasiswa 18–24 tahun di Kenya
    s2_hint_body: Gaya hidup, peran, wilayah, bahasa — apa pun yang membentuk cara berpikir kelompok ini.
    s3_eyebrow: Langkah 03 · Tujuan pembelajaran
    s3_lead: Wawasan yang akan mengubah suatu keputusan.
    s3_body: Lewati hal-hal yang sudah Anda ketahui. Targetkan satu hal yang, jika Anda mempelajarinya, akan mengubah langkah Anda selanjutnya.
    s3_examples:
    - Mengapa relawan berhenti setelah bulan ketiga?
    - Apa yang menghalangi orang mengakses bank pangan kami?
    - Apakah program remaja kami benar-benar meningkatkan kepercayaan diri — dan di bagian mana tepatnya?
    s3_title: Apa yang ingin Anda pelajari dari mereka?
    s3_placeholder: misal Mengapa relawan berhenti setelah bulan ketiga?
    s3_hint_body: Lewati apa yang sudah Anda ketahui — targetkan satu hal yang akan mengubah langkah Anda selanjutnya.
