    examples: उदाहरण
    s1_eyebrow: चरण 01 · आपके Verto के बारे में
    s1_lead: एकमात्र व्यापक विषय।
    s1_body: इसे व्यापक रखें — आप अगले चरणों में दृष्टिकोण को संकीर्ण करेंगे। एक या दो शब्द आमतौर पर पर्याप्त होते हैं।
    s1_examples:
    - जलवायु कार्रवाई
    - शरणार्थी शिक्षा
    - खाद्य सुरक्षा
    s1_title: आपका Verto किस बारे में है?
    s1_placeholder: उदा. युवा कल्याण
    s1_hint_body: इसे व्यापक रखें — आप अगले चरणों में दृष्टिकोण को संकीर्ण करेंगे।
    s2_eyebrow: चरण 02 · कौन उत्तर दे रहा है
    s2_lead: विशिष्ट रहें।
    s2_body: जीवनशैली, भूमिका, क्षेत्र, भाषा — कुछ भी जो यह आकार देता है कि यह समूह कैसे सोचता है। जितना ठोस, उतने बेहतर प्रश्न हम लिख सकते हैं।
    s2_examples:
    - केन्या में 18–24 विश्वविद्यालय के छात्र
    - 35–55 अग्रिम-पंक्ति सामुदायिक-स्वास्थ्य कार्यकर्ता
    - ग्रामीण NSW में स्कूली बच्चों के माता-पिता
    s2_title: कौन उत्तर दे रहा है — और उनकी उम्र क्या है?
    s2_placeholder: उदा. केन्या में 18–24 विश्वविद्यालय के छात्र
    s2_hint_body: जीवनशैली, भूमिका, क्षेत्र, भाषा — कुछ भी जो यह आकार देता है कि यह समूह कैसे सोचता है।
    s3_eyebrow: चरण 03 · सीखने का लक्ष्य
    s3_lead: वह अंतर्दृष्टि जो किसी निर्णय को बदल दे।
    s3_body: जो आप पहले से जानते हैं उसे छोड़ दें। उस एक चीज़ का लक्ष्य रखें जो, यदि आप सीख लें, तो आपका अगला कदम बदल दे।
    s3_examples:
    - स्वयंसेवक तीसरे महीने के बाद क्यों छोड़ देते हैं?
    - लोगों को हमारे फूड बैंक तक पहुंचने से क्या रोक रहा है?
    - क्या हमारा युवा कार्यक्रम वास्तव में आत्मविश्वास बढ़ाता है — और कहां ठीक-ठीक?
    s3_title: आप उनसे क्या जानना चाहते हैं?
    s3_placeholder: उदा. स्वयंसेवक तीसरे महीने के बाद क्यों छोड़ देते हैं?
    s3_hint_body: जो आप पहले से जानते हैं उसे छोड़ दें — उस एक चीज़ का लक्ष्य रखें जो आपका अगला कदम बदल दे।
    s4_eyebrow: चरण 04 · भाषाएं
    s4_lead: हर किसी तक उनकी अपनी भाषा में पहुंचें।
    s4_body: हम आपका Verto आपकी प्राथमिक भाषा में लिखेंगे, फिर हर दूसरी भाषा में उतना ही अच्छा संस्करण तैयार करेंगे। हर संस्करण समान प्रश्न पूछता है, इसलिए परिणाम संरेखित रहते हैं।
    s4_title: यह Verto कौन-सी भाषाएं बोले?
    s4_primary_label: प्राथमिक भाषा
    s5_eyebrow: चरण 05 · ब्रांड रंग
    s5_lead: इसे अपने जैसा महसूस कराएं।
    s5_body: यह वैसा है जैसा आपका Verto हर उस व्यक्ति को दिखता है जो इसे खेलता है। आप इसे संपादक से कभी भी ठीक कर सकते हैं।
    s5_live_preview: लाइव पूर्वावलोकन
    s5_quick_poll: त्वरित पोल
    s5_mock_q: आपको यह कैसा लग रहा है?
    s5_mock_opt: बहुत पसंद आया
    s5_title: अपने ब्रांड रंग चुनें।
    s5_sub: तीन चुनें। ये इस Verto के अनुभव में लागू होंगे।
    brand_primary: प्राथमिक
    brand_primary_desc: शीर्षक और एक्सेंट
    brand_cta: बटन (CTA)
    brand_cta_desc: आगे / जमा करें बटन
    brand_bg: पृष्ठभूमि
    brand_bg_desc: कार्ड के पीछे का कैनवास
    s6_eyebrow: चरण 06 · संदर्भ
    optional: वैकल्पिक
    s6_lead: और कुछ जो हमें शामिल करना चाहिए?
    s6_body: स्वर, अनिवार्य प्रश्न, बचने योग्य बातें, दर्शकों की विशेषताएं। यदि कुछ अतिरिक्त नहीं है तो छोड़ दें।
    s6_examples:
    - वित्तपोषण मार्गों और अनुदान की बाधाओं के बारे में एक प्रश्न अवश्य शामिल करें।
    - शब्दजाल से बचें — कई उत्तरदाता अंग्रेज़ी दूसरी भाषा के रूप में बोलते हैं।
    - स्वर को गर्मजोशी भरा रखें, कॉर्पोरेट नहीं।
    s6_title: और कुछ जो हमें जानना चाहिए?
    s6_placeholder: उदा. दर्शकों ने पहले कभी Playverto का उपयोग नहीं किया है, स्वर को गर्मजोशी भरा रखें, कॉर्पोरेट नहीं।
    s6_compare_label: उत्तरदाताओं को अपने उत्तरों की तुलना करने दें
    s6_compare_desc: धन्यवाद पृष्ठ पर एक CTA दिखाएं जो बताता है कि उनके उत्तर बाकी सभी की तुलना में कैसे हैं।
