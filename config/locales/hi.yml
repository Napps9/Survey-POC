    section_brand_colours: ब्रांड रंग
    s7_eyebrow: चरण 07 · अंतिम स्पर्श
    s7_lead: तैयार दिखने वाले Verto में खोलें, या एक खाली कैनवास से शुरू करें।
    s7_body: हम अपनी क्यूरेटेड लाइब्रेरी से एक बैकड्रॉप और प्रत्येक कार्ड के लिए इमेजरी चुनते हैं — जो आपकी थीम, दर्शकों और हर कार्ड के प्रश्न से मेल खाती है।
    s7_perks_label: पॉप्युलेट से आपको क्या मिलता है
    s7_perks:
    - थीम से मेल खाता सर्वे बैकड्रॉप
    - स्वाइप कार्ड सहित हर कार्ड पर इमेजरी
    - सही लगने तक एडिटर में शफ़ल करें
    s7_title: आप कैसे शुरू करना चाहेंगे?
    s7_sub: आप एडिटर में कभी भी कुछ भी बदल सकते हैं।
    s7_recommended: अनुशंसित
    s7_populate_label: कॉन्टेंट पॉप्युलेट करें
    s7_populate_desc: आपके ब्रीफ़ से मेल खाते बैकड्रॉप और हर कार्ड पर तस्वीर के साथ एडिटर खोलें।
    s7_blank_label: खाली से शुरू करें
    s7_blank_desc: बिना किसी इमेजरी के एडिटर खोलें, ताकि आप हर तस्वीर खुद चुन सकें।
