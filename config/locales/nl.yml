    s1_title: Waar gaat je Verto over?
    s1_placeholder: bijv. Welzijn van jongeren
    s1_hint_body: Houd het breed — je verfijnt de invalshoek in de volgende stappen.
    s2_eyebrow: Stap 02 · Wie er antwoordt
    s2_lead: Wees specifiek.
    s2_body: Levensstijl, functie, regio, taal — alles wat invloed heeft op hoe deze groep denkt. Hoe concreter, hoe beter de vragen die we kunnen schrijven.
    s2_examples:
    - 18–24 jaar, universiteitsstudenten in Kenia
    - 35–55 jaar, eerstelijns gezondheidsmedewerkers
    - Ouders van schoolgaande kinderen op het platteland van NSW
    s2_title: Wie antwoordt er — en welke leeftijd hebben ze?
    s2_placeholder: bijv. 18–24 jaar, universiteitsstudenten in Kenia
    s2_hint_body: Levensstijl, functie, regio, taal — alles wat invloed heeft op hoe deze groep denkt.
    s3_eyebrow: Stap 03 · Het leerdoel
    s3_lead: Het inzicht dat een beslissing zou veranderen.
    s3_body: Sla over wat je al weet. Mik op het ene ding dat, als je het zou leren, je vervolgstappen zou veranderen.
    s3_examples:
    - Waarom haken vrijwilligers af na maand drie?
    - Wat weerhoudt mensen ervan onze voedselbank te gebruiken?
    - Vergroot ons jongerenprogramma echt het zelfvertrouwen — en waar precies?
    s3_title: Wat wil je van hen leren?
    s3_placeholder: bijv. Waarom haken vrijwilligers af na maand drie?
    s3_hint_body: Sla over wat je al weet — mik op het ene ding dat je vervolgstappen zou veranderen.
