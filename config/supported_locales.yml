# Single source of truth for every language the product can run in.
#
# Used by SupportedLocales (app/lib/supported_locales.rb), which feeds:
#   - Rails I18n available_locales (platform UI language)
#   - the top-right flag language switcher
#   - the Verto creation-flow language picker
#   - the editor language tabs
#   - the public player language switcher
#
# Adding a language is a one-line entry here (+ an optional config/locales/<code>.yml
# for the UI chrome; missing UI strings fall back to English).
#
# Fields:
#   code         - I18n locale code (kept hyphen-free to stay clean in params/URLs)
#   english_name - name in English (for admin/debug)
#   native_name  - endonym, shown in the switcher
#   flag         - emoji flag shown in the CTA
#   dir          - "ltr" or "rtl"
locales:
  - { code: en, english_name: English,             native_name: English,            flag: "🇬🇧", dir: ltr }
  - { code: es, english_name: Spanish,             native_name: Español,            flag: "🇪🇸", dir: ltr }
  - { code: fr, english_name: French,              native_name: Français,           flag: "🇫🇷", dir: ltr }
  - { code: de, english_name: German,              native_name: Deutsch,            flag: "🇩🇪", dir: ltr }
  - { code: pt, english_name: Portuguese,          native_name: Português,          flag: "🇵🇹", dir: ltr }
  - { code: it, english_name: Italian,             native_name: Italiano,           flag: "🇮🇹", dir: ltr }
  - { code: nl, english_name: Dutch,               native_name: Nederlands,         flag: "🇳🇱", dir: ltr }
  - { code: pl, english_name: Polish,              native_name: Polski,             flag: "🇵🇱", dir: ltr }
  - { code: ru, english_name: Russian,             native_name: Русский,            flag: "🇷🇺", dir: ltr }
  - { code: uk, english_name: Ukrainian,           native_name: Українська,         flag: "🇺🇦", dir: ltr }
  - { code: tr, english_name: Turkish,             native_name: Türkçe,             flag: "🇹🇷", dir: ltr }
  - { code: ar, english_name: Arabic,              native_name: العربية,            flag: "🇸🇦", dir: rtl }
  - { code: he, english_name: Hebrew,              native_name: עברית,              flag: "🇮🇱", dir: rtl }
  - { code: zh, english_name: Chinese (Simplified), native_name: 简体中文,           flag: "🇨🇳", dir: ltr }
  - { code: ja, english_name: Japanese,            native_name: 日本語,             flag: "🇯🇵", dir: ltr }
  - { code: ko, english_name: Korean,              native_name: 한국어,             flag: "🇰🇷", dir: ltr }
  - { code: hi, english_name: Hindi,               native_name: हिन्दी,              flag: "🇮🇳", dir: ltr }
  - { code: id, english_name: Indonesian,          native_name: Bahasa Indonesia,   flag: "🇮🇩", dir: ltr }
  - { code: vi, english_name: Vietnamese,          native_name: Tiếng Việt,         flag: "🇻🇳", dir: ltr }
  - { code: sw, english_name: Swahili,             native_name: Kiswahili,          flag: "🇰🇪", dir: ltr }
