  badge:        "RATING"
  badge_css:    "sb-range"
  panel_label:  "TAP TO RATE"
  eyebrow:      "Tap to rate"
  picker_name:  "Rating"
  picker_desc:  "Slider with star rating"
  picker_icon:  "★"
  pickable:     true

