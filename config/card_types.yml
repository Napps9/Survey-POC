# Single source of truth for question-card type metadata.
#
# Consumed by:
#   - Ruby: app/lib/card_types.rb (class methods used by helpers + views)
#   - JS:   app/javascript/controllers/type_panel_controller.js, which reads
#           a JSON blob emitted by surveys/show.html.erb (from the same YAML).
#
# Order matters — it's the order the picker shows. `pickable: false` hides
# a type from the picker but keeps its metadata available for rendering
# saved cards.

range:
  badge:        "RANGE"
  badge_css:    "sb-range"
  panel_label:  "DRAG THE SLIDER"
  eyebrow:      "Drag the slider"
  picker_name:  "Range / Slider"
  picker_desc:  "Drag along a scale"
  picker_icon:  "↔"
  pickable:     true

